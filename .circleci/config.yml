version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - run:
          name: Install SBT
          command: |
            curl -fL "https://github.com/sbt/sbt/releases/download/v1.10.7/sbt-1.10.7.tgz" \
              | tar xz -C /tmp
            sudo mv /tmp/sbt /usr/local/sbt
            echo 'export PATH=$PATH:/usr/local/sbt/bin' >> "$BASH_ENV"
      - restore_cache:
          keys:
            - sbt-cache-v3-{{ checksum "build.sbt" }}-{{ checksum "project/build.properties" }}
            - sbt-cache-v3-
      - run:
          name: Build fat JAR
          command: sbt assembly
      - save_cache:
          key: sbt-cache-v3-{{ checksum "build.sbt" }}-{{ checksum "project/build.properties" }}
          paths:
            - "~/.ivy2/cache"
            - "~/.sbt"
            - "~/.m2"
            - "~/.cache/coursier"
      - store_artifacts:
          path: target/egonet-1.0.0.jar

workflows:
  build:
    jobs:
      - build
